id: ene_smbus
name: ASUS/ENE SMBus RGB
author: HaloDaemon
version: 1.0.0
license: GPL-2.0-or-later
description: ASUS Aura / ENE SMBus RGB for DRAM sticks and GPUs.
translations:
  it:
    plugin.name: RGB SMBus ASUS/ENE
    plugin.description: RGB ASUS Aura / ENE tramite SMBus per moduli DRAM e GPU.
platforms: [linux, windows]
permissions: [smbus]
capabilities: [lighting]
devices:
  - vendor: ENE
    model: SMBus DRAM
    name: ENE DRAM RGB
    type: ram
    match:
      smbus:
        bus: chipset
        addresses: [0x70, 0x71, 0x72, 0x73, 0x74, 0x75, 0x76, 0x4f, 0x66, 0x67, 0x39, 0x3a, 0x3b, 0x3c, 0x3d]
        extra_addresses: [0x77]
        max_bytes_per_sec: 6000
        pre_scan: true
        probe: quick
  - vendor: ASUS
    model: SMBus GPU
    name: ASUS GPU RGB
    type: gpu
    match:
      smbus:
        bus: gpu
        addresses: [0x67]
        probe: read_byte
        pci_match:
          - vendor: 0x10DE
            sub_vendor: 0x1043
            confirmed: false
          - vendor: 0x1002
            sub_vendor: 0x1043
            confirmed: false
