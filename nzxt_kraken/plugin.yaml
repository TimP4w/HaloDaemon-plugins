id: nzxt_kraken
name: NZXT Kraken Z/Elite
author: HaloDaemon
version: 1.2.0
poll_interval_ms: 250
license: GPL-3.0-or-later
description: NZXT Kraken Z/Elite family with RGB, pump, telemetry, LCD, and chained fans.
translations:
  it:
    plugin.name: NZXT Kraken Z/Elite
    plugin.description: Famiglia NZXT Kraken Z/Elite con RGB, pompa, telemetria, LCD e ventole collegate.
permissions: [hid, usb]
capabilities: [lighting, cooling, sensors, lcd, lighting_division]
devices:
  - vendor: NZXT
    model: Kraken
    name: Kraken Z53/63/73
    type: a_i_o
    match: { hid: { vid: 0x1E71, pid: 0x3008 } }
  - vendor: NZXT
    model: Kraken
    name: Kraken Elite 2023
    type: a_i_o
    match: { hid: { vid: 0x1E71, pid: 0x300C } }
  - vendor: NZXT
    model: Kraken
    name: Kraken 2023
    type: a_i_o
    match: { hid: { vid: 0x1E71, pid: 0x300E } }
  - vendor: NZXT
    model: Kraken
    name: Kraken Elite V2
    type: a_i_o
    match: { hid: { vid: 0x1E71, pid: 0x3012 } }
  - vendor: NZXT
    model: Kraken
    name: Kraken Plus 2024
    type: a_i_o
    match: { hid: { vid: 0x1E71, pid: 0x3014 } }
transports:
  hid: { report_size: 64, timeout_ms: 1000, feature_report: false }
  usb:
    devices:
      - id: primary
        endpoints:
          - { address: 0x02, type: bulk, max_transfer_size: 4194304, max_timeout_ms: 10000 }
