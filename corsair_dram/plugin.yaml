id: corsair_dram
name: Corsair DRAM RGB
author: HaloDaemon
version: 1.0.0
license: GPL-2.0-or-later
description: Corsair iCUE DRAM RGB (Vengeance / Dominator, DDR4 & DDR5).
platforms: [linux, windows]
permissions: [smbus]
capabilities: [lighting]
devices:
  - vendor: Corsair
    model: iCUE DRAM
    name: Corsair DRAM RGB
    type: ram
    match:
      smbus:
        bus: chipset
        addresses:
          - 0x0058
          - 0x0059
          - 0x005A
          - 0x005B
          - 0x005C
          - 0x005D
          - 0x005E
          - 0x005F
          - 0x0018
          - 0x0019
          - 0x001A
          - 0x001B
          - 0x001C
          - 0x001D
          - 0x001E
          - 0x001F
