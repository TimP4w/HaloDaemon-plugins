id: nzxt_kraken_x3
name: NZXT Kraken X53/X63/X73
author: HaloDaemon
version: 1.2.0
license: GPL-3.0-or-later
description: NZXT Kraken X-series with ring/logo RGB, telemetry, and chained accessories.
translations:
  it:
    plugin.name: NZXT Kraken X53/X63/X73
    plugin.description: Serie NZXT Kraken X con RGB dell'anello e del logo, telemetria e ventole collegate.
permissions: [hid]
capabilities: [lighting, sensors, lighting_division]
devices:
  - vendor: NZXT
    model: Kraken X
    name: Kraken X53/X63/X73
    type: a_i_o
    match: { hid: { vid: 0x1E71, pid: 0x2007 } }
  - vendor: NZXT
    model: Kraken X
    name: Kraken X53/X63/X73
    type: a_i_o
    match: { hid: { vid: 0x1E71, pid: 0x2014 } }
transports:
  hid: { report_size: 64, timeout_ms: 1000, feature_report: false }
