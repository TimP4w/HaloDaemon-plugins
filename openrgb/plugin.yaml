id: openrgb
type: integration
name: OpenRGB
author: HaloDaemon
version: 1.0.0
license: GPL-3.0-or-later
description: Connects to an OpenRGB server and exposes its controllers as devices.
capabilities: [lighting]
permissions:
  - network
requirements:
  - kind: command
    name: openrgb
transports:
  tcp:
    host_key: host
    port_key: port
    timeout_ms: 5000
    allow_private: true
config:
  fields:
  - default: 127.0.0.1
    kind: host
    label: Server host
    key: host
  - default: '6742'
    kind: port
    label: Server port
    key: port
