id: openrgb
compatibility:
  halod: ">=0.2.0"
  plugin_api: 1
type: integration
name: OpenRGB
author: HaloDaemon
version: 1.0.0
license: GPL-3.0-or-later
description: Connects to an OpenRGB server and exposes its controllers as devices.
permissions:
  - network
transports:
  tcp:
    host_key: host
    port_key: port
    timeout_ms: 5000
    allow_private: true
