id: philips_evnia
compatibility:
  halod: ">=0.2.0"
  plugin_api: 1
name: Philips Evnia 49
author: HaloDaemon
version: 1.0.0
license: GPL-3.0-or-later
description: Philips Evnia 49M2C8900 — DDC/CI picture/OSD controls + Ambiglow RGB.
devices:
- vendor: Philips
  model: 49M2C8900
  name: Philips Evnia 49
  device_type: monitor
  transport: usb_control
  vid: 0x2109
  pid: 0x8884
  pre_scan: false
  probe: quick
transports:
  usb_control:
    interface: 0
    endpoints:
    - id: ambiglow
      vid: 3314
      pid: 45569
      interface: 0
choice:
  choices:
  - label: Input Source
    key: input_source
    default: 0
    options:
    - id: '0'
      label: DisplayPort 1
    - id: '1'
      label: DisplayPort 2
    - id: '2'
      label: HDMI 1
    - id: '3'
      label: HDMI 2
  - label: SmartImage
    default: 0
    category: smart_image
    key: smart_image
    options:
    - id: '0'
      label: Standard
    - id: '1'
      label: FPS
    - id: '2'
      label: Movie
    - id: '3'
      label: Game 1
    - id: '4'
      label: Game 2
    - id: '5'
      label: Racing
    - id: '6'
      label: RTS
    - id: '7'
      label: Economy
    - id: '8'
      label: LowBlue Mode
    - id: '9'
      label: EasyRead
    - id: '10'
      label: Console Mode
    - id: '11'
      label: HDR Game
    - id: '12'
      label: HDR Movie
    - id: '13'
      label: HDR Vivid
    - id: '14'
      label: HDR True Black
    - id: '15'
      label: HDR Personal
    - id: '16'
      label: HDR Off
  - label: Color Temperature
    default: 0
    category: picture
    key: color_temperature
    options:
    - id: '0'
      label: Native
    - id: '1'
      label: 5000K
    - id: '2'
      label: 6500K
    - id: '3'
      label: 7500K
    - id: '4'
      label: 8200K
    - id: '5'
      label: 9300K
    - id: '6'
      label: 11500K
    - id: '7'
      label: Preset
  - label: Gamma
    default: 2
    category: picture
    key: gamma
    options:
    - id: '0'
      label: '1.0'
    - id: '1'
      label: '2.0'
    - id: '2'
      label: '2.2'
    - id: '3'
      label: '2.4'
    - id: '4'
      label: '2.6'
  - label: Pixel Orbiting
    default: 0
    category: setup
    key: pixel_orbiting
    options:
    - id: '0'
      label: Off
    - id: '1'
      label: Slow
    - id: '2'
      label: Normal
    - id: '3'
      label: Fast
  - label: Screen Saver
    default: 0
    category: setup
    key: screen_saver
    options:
    - id: '0'
      label: Off
    - id: '1'
      label: Slow
    - id: '2'
      label: Fast
  - label: Crosshair
    default: 0
    category: gaming
    key: crosshair
    options:
    - id: '0'
      label: Off
    - id: '1'
      label: On
    - id: '2'
      label: Smart
  - label: SmartResponse
    default: 0
    category: gaming
    key: smart_response
    options:
    - id: '0'
      label: Off
    - id: '1'
      label: Fast
    - id: '2'
      label: Faster
    - id: '3'
      label: Fastest
  - label: OSD Transparency
    default: 0
    category: osd
    key: osd_transparency
    options:
    - id: '0'
      label: Off
    - id: '1'
      label: '1'
    - id: '2'
      label: '2'
    - id: '3'
      label: '3'
    - id: '4'
      label: '4'
