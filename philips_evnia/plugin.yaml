id: philips_evnia
name: Philips Evnia 49
author: HaloDaemon
version: 1.0.0
license: GPL-3.0-or-later
description: Philips Evnia 49M2C8900 — DDC/CI picture/OSD controls + Ambiglow RGB.
capabilities: [rgb, controls]
devices:
  - vendor: Philips
    model: 49M2C8900
    name: Philips Evnia 49
    type: monitor
    match:
      usb_control: { vid: 0x2109, pid: 0x8884 }
transports:
  usb_control:
    interface: 0
    endpoints:
      - id: ambiglow
        vid: 0x0cf2
        pid: 0xb201
        interface: 0
