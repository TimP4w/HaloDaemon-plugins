      label: Hungarian
    - id: '19'
      label: Polish
    - id: '20'
      label: Ukrainian
  - label: USB-C Setting
    default: 0
    category: system_usb
    key: usb_c_setting
    options:
    - id: '0'
      label: High Resolution (USB 2.0)
    - id: '1'
      label: High Data Speed (USB 3.2)
  - label: KVM
    default: 0
    category: system_usb
    key: kvm
    options:
    - id: '0'
      label: Auto
    - id: '1'
      label: USB Up
    - id: '2'
      label: USB-C
  - label: Power
    default: 0
    category: setup
    key: power_mode
    options:
    - id: '0'
      label: On
    - id: '1'
      label: Standby
boolean:
  booleans:
  - label: Adaptive Sync
    key: adaptive_sync
    category: gaming
  - label: Low Input Lag
    key: low_input_lag
    category: gaming
  - label: Mute Audio
    key: audio_mute
