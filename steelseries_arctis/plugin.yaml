id: steelseries_arctis
name: SteelSeries Arctis Nova Pro Wireless
author: HaloDaemon
version: 1.0.0
poll_interval_ms: 250
license: GPL-3.0-or-later
description: SteelSeries Arctis Nova Pro Wireless / Wireless X controls and equalizer and chatmix support on linux.
translations:
  it:
    plugin.name: SteelSeries Arctis Nova Pro Wireless
    plugin.description: Controlli ed equalizzatore per SteelSeries Arctis Nova Pro Wireless / Wireless X e supporto chatmix su linux.
permissions: [hid, audio_routing]
capabilities: [battery, controls, equalizer]
devices:
  - vendor: SteelSeries
    model: Arctis Nova Pro Wireless
    name: Arctis Nova Pro Wireless
    type: headset
    match:
      hid: { vid: 0x1038, pid: 0x12e0, interface: 4 }
    control_layout:
      - { category: Microphone, order: 0, column: 0 }
      - { category: Noise Cancelling, order: 1, column: 1 }
      - { category: Audio, order: 2, column: 0 }
      - { category: Base Station, order: 3, column: 1 }
  - vendor: SteelSeries
    model: Arctis Nova Pro Wireless X
    name: Arctis Nova Pro Wireless X
    type: headset
    match:
      hid: { vid: 0x1038, pids: [0x12e5, 0x225d], interface: 4 }
    control_layout:
      - { category: Microphone, order: 0, column: 0 }
      - { category: Noise Cancelling, order: 1, column: 1 }
      - { category: Audio, order: 2, column: 0 }
      - { category: Base Station, order: 3, column: 1 }
transports:
  hid: { report_size: 64, timeout_ms: 1000, feature_report: false }
