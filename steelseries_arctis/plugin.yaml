id: steelseries_arctis
name: SteelSeries Arctis Nova Pro Wireless
author: HaloDaemon
version: 1.0.0
license: GPL-3.0-or-later
description:
  "SteelSeries Arctis Nova Pro Wireless / Wireless X base station: battery, mic
  controls, noise-cancelling, wireless/base-station settings, and a 10-band
  equalizer."
permissions:
  - audio_routing
devices:
  - vendor: SteelSeries
    model: Arctis Nova Pro Wireless
    name: Arctis Nova Pro Wireless
    device_type: headset
    transport: hid
    vid: 0x1038
    pid: 0x12e0
    interface: 4
  - vendor: SteelSeries
    model: Arctis Nova Pro Wireless X
    name: Arctis Nova Pro Wireless X
    device_type: headset
    transport: hid
    vid: 0x1038
    pids: [0x12e5, 0x225d]
    interface: 4
transports:
  hid:
    report_size: 64
    timeout_ms: 1000
    feature_report: false
