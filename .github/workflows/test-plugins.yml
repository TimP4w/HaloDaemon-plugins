name: Test plugins

on:
  push:
  pull_request:

jobs:
  plugin-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out this repo
        uses: actions/checkout@v4
        with:
          path: plugins

      - name: Check out HaloDaemon
        uses: actions/checkout@v4
        with:
          repository: TimP4w/HaloDaemon
          path: halodaemon

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            libpipewire-0.3-dev libudev-dev

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: halodaemon/src

      - name: Build halod plugin-test harness
        run: cargo build -p halod --features plugin-test
        working-directory: halodaemon/src

      - name: Verify generated package index and every SHA-256
        run: |
          for manifest in plugins/*/plugin.yaml; do
            package="${manifest%/plugin.yaml}"
            test -f "$package/docs/protocol.md" || {
              echo "missing protocol documentation: $package/docs/protocol.md"
              exit 1
            }
          done
          cargo run --manifest-path halodaemon/src/Cargo.toml \
            -p halod-plugin-signing -- validate plugins
          cargo run --manifest-path halodaemon/src/Cargo.toml \
            -p halod-plugin-signing -- index plugins --check
          python3 plugins/scripts/generate-licenses.py \
            --output "$RUNNER_TEMP/plugin-licenses.txt"

      - name: Run halod plugin-test on every package with a test.lua
        run: |
          set -euo pipefail
          status=0
          for dir in */; do
            dir="${dir%/}"
            [ -f "$dir/plugin.yaml" ] || continue
            [ -f "$dir/test.lua" ] || { echo "$dir: no test.lua — skipping"; continue; }
            echo "::group::$dir"
            ../halodaemon/src/target/debug/halod plugin-test "$dir" || status=1
            echo "::endgroup::"
          done
          exit $status
        working-directory: plugins

  reuse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6.0.0
