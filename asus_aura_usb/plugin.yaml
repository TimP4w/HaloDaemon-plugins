id: asus_aura_usb
name: ASUS Aura USB
author: HaloDaemon
version: 1.0.0
license: GPL-2.0-or-later
description: ASUS Aura USB motherboard RGB - per-LED direct control of the on-board zones and ARGB headers.
translations:
  it:
    plugin.name: ASUS Aura USB
    plugin.description: RGB ASUS Aura USB per schede madri - controllo diretto per LED delle zone integrate e degli header ARGB.
permissions: [hid]
capabilities: [lighting, lighting_division]
devices:
  - vendor: ASUS
    model: ASUS Aura Motherboard
    name: ASUS Aura
    type: motherboard
    match:
      hid:
        vid: 0x0B05
        pids:
          - 0x1AA6
          - 0x18A3
          - 0x1866
          - 0x18A5
          - 0x18F3
          - 0x1867
          - 0x1872
          - 0x1939
          - 0x19AF
          - 0x1A30
          - 0x1A6C
          - 0x1B3B
          - 0x1BED
transports:
  hid:
    report_size: 0
    timeout_ms: 1000
